name: Universal Image Converter Build

on:
  push

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 3つの主要OSで並列実行
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 各OSでの依存関係（Cairo等）の解決
      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cairo

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          # main.pyを1つの実行ファイルにまとめ、コンソール非表示、ライブラリを全同梱
          pyinstaller --onefile --noconsole \
          --collect-all customtkinter \
          --collect-all cairosvg \
          main.py

      - name: Organize Artifacts
        shell: bash
        run: |
          mkdir -p output
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/main.exe output/image-converter-win.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv dist/main output/image-converter-mac
          else
            mv dist/main output/image-converter-linux
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
