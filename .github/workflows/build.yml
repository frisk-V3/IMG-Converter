name: Continuous Build

on:
  push:
    branches:
      - main  # mainブランチにプッシュされたら起動

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cairo

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --noconsole \
          --collect-all customtkinter \
          --collect-all cairosvg \
          main.py

      - name: Organize Artifacts
        shell: bash
        run: |
          mkdir -p output
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/main.exe output/image-converter-win.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            [ -f dist/main ] && mv dist/main output/image-converter-mac
          else
            [ -f dist/main ] && mv dist/main output/image-converter-linux
          fi

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*
          tag_name: latest  # 常に "latest" というタグでリリース
          name: "Latest Build"
          body: "Automated build from the latest push."
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
